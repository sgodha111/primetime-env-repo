apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: event-service
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/sgodha111/primetime-service-template.git
    targetRevision: main
    path: k8s

  destination:
    server: https://kubernetes.default.svc
    namespace: default

  syncPolicy:
    automated:
      prune: true
      selfHeal: true